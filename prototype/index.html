<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One — Interactive Prototype</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  :root{
    --ink:#0A0A0B; --paper:#FFFFFF;
    --g100:#F4F4F5; --g200:#E7E7EA; --g300:#D2D2D8; --g400:#9A9AA0; --g600:#5B5B61; --g700:#3A3A3E;
    --pulse:#F14E23; --pulse-soft:#FDEDE8;
    --ok:#2E9E5B; --watch:#F5A623; --crit:#E5484D; --info:#3B82F6;
    --bg:var(--paper); --fg:var(--ink); --card:#fff; --border:var(--g200); --muted:var(--g600); --rail:#FBFBFC; --canvas:#F7F7F8;
    --radius:12px; --shadow:0 8px 30px rgba(10,10,11,.10);
    --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  [data-theme="dark"]{
    --bg:#0C0C0E; --fg:#F4F4F5; --card:#141417; --border:#26262B; --muted:#9A9AA0; --canvas:#0A0A0B; --rail:#101013; --g100:#1B1B1F; --g200:#26262B; --g300:#33333a;
    --shadow:0 8px 30px rgba(0,0,0,.5); --pulse-soft:rgba(241,78,35,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--canvas);color:var(--fg);-webkit-font-smoothing:antialiased;overflow:hidden}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  .num{font-variant-numeric:tabular-nums}

  /* ---------- shell ---------- */
  .app{display:grid;grid-template-rows:56px 1fr;height:100vh}
  /* global bar */
  .bar{display:flex;align-items:center;gap:14px;padding:0 16px;border-bottom:1px solid var(--border);background:var(--bg)}
  .brand{display:flex;align-items:center;gap:9px;width:200px;flex-shrink:0}
  .brand .mk{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;background:var(--ink)}
  .brand .mk svg{width:18px;height:18px}
  .brand .nm{font-weight:700;font-size:17px;letter-spacing:-.02em}
  .brand .nm small{font-weight:500;color:var(--muted);font-size:11px;margin-left:4px}
  .askbar{flex:1;max-width:680px;margin:0 auto;display:flex;align-items:center;gap:10px;background:var(--g100);border:1px solid var(--border);border-radius:11px;padding:9px 14px;color:var(--muted);font-size:13.5px;transition:.15s;cursor:text}
  .askbar:hover{border-color:var(--g300);background:var(--bg)}
  .askbar .halo{width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,var(--pulse),#ff9a6e);flex-shrink:0}
  .askbar .kbd{margin-left:auto;font-size:11px;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:2px 6px}
  .barright{display:flex;align-items:center;gap:6px;width:200px;justify-content:flex-end;flex-shrink:0}
  .ib{width:38px;height:38px;border-radius:9px;display:grid;place-items:center;color:var(--muted);position:relative}
  .ib:hover{background:var(--g100);color:var(--fg)}
  .ib .dot{position:absolute;top:8px;right:9px;width:7px;height:7px;border-radius:50%;background:var(--pulse);border:2px solid var(--bg)}
  .avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#3A3A3E,#0A0A0B);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:600}

  .body{display:grid;grid-template-columns:212px 1fr;min-height:0}
  /* perspective rail */
  .rail{background:var(--rail);border-right:1px solid var(--border);padding:14px 10px;overflow-y:auto}
  .rgrp{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--g400);font-weight:600;margin:14px 8px 6px}
  .rgrp:first-child{margin-top:0}
  .pnav{width:100%;display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;font-size:13.5px;font-weight:500;color:var(--g700);text-align:left}
  [data-theme="dark"] .pnav{color:#c9c9d0}
  .pnav:hover{background:var(--g100)}
  .pnav.on{background:var(--pulse-soft);color:var(--pulse);font-weight:600}
  .pnav .gi{width:18px;height:18px;flex-shrink:0;display:grid;place-items:center}
  .pnav .gi svg{width:17px;height:17px}
  .pnav.locked{opacity:.5}
  .pnav .lk{margin-left:auto;font-size:10px}
  .railftr{margin-top:14px;border-top:1px solid var(--border);padding-top:10px}

  /* canvas */
  .canvas{overflow-y:auto;padding:22px 26px 60px}
  .canvas::-webkit-scrollbar{width:10px}.canvas::-webkit-scrollbar-thumb{background:var(--g300);border-radius:8px;border:3px solid var(--canvas)}
  .phead{display:flex;align-items:center;gap:10px;margin-bottom:3px}
  .ptag{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--pulse);background:var(--pulse-soft);padding:3px 9px;border-radius:20px}
  .hello{font-size:23px;font-weight:700;letter-spacing:-.02em}
  .sub{color:var(--muted);font-size:14px;margin:2px 0 18px}

  .insight{position:relative;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:16px;overflow:hidden}
  .insight::before{content:"";position:absolute;inset:0;background:radial-gradient(560px 110px at 0 0,rgba(241,78,35,.09),transparent 60%);pointer-events:none}
  .insight .t{font-size:11px;font-weight:700;color:var(--pulse);text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;gap:6px;margin-bottom:7px}
  .insight p{font-size:14px;line-height:1.55;color:var(--muted);max-width:780px}
  .insight .src{margin-top:8px;font-size:12px;color:var(--g400)}

  .grid{display:grid;gap:14px}
  .g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}
  @media(max-width:1080px){.g2,.g3{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
  .card h4{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:600;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
  .card h4 .badge{background:var(--pulse);color:#fff;border-radius:20px;padding:1px 7px;font-size:10px}
  .metric{font-size:27px;font-weight:700;letter-spacing:-.02em}
  .delta{font-size:12px;font-weight:600;margin-left:6px}.up{color:var(--ok)}.down{color:var(--crit)}
  .row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
  .row:last-child{border-bottom:none}
  .row .ic{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;background:var(--g100);flex-shrink:0;font-size:13px}
  .row .gr{flex:1;min-width:0}.row .gr .t{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.row .gr .m{color:var(--muted);font-size:12px}
  .pill{font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px}
  .p-ok{background:rgba(46,158,91,.12);color:var(--ok)}.p-watch{background:rgba(245,166,35,.16);color:#b9791a}.p-crit{background:rgba(229,72,77,.12);color:var(--crit)}
  .btn{font-size:12px;font-weight:600;padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg)}
  .btn:hover{border-color:var(--g400)}
  .btn.primary{background:var(--pulse);color:#fff;border-color:var(--pulse)}.btn.primary:hover{filter:brightness(.95)}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin:2px 0 4px}
  .chip{font-size:12px;font-weight:500;padding:7px 12px;border-radius:9px;border:1px solid var(--border);background:var(--bg);display:flex;align-items:center;gap:6px}
  .chip:hover{border-color:var(--pulse);color:var(--pulse)}
  .spark{display:flex;align-items:flex-end;gap:3px;height:32px}.spark i{flex:1;background:var(--g300);border-radius:2px}.spark i.hi{background:var(--pulse)}
  .bar-mini{height:7px;border-radius:6px;background:var(--g200);overflow:hidden;margin-top:6px}.bar-mini i{display:block;height:100%;background:var(--pulse)}
  .ws{display:flex;gap:10px;flex-wrap:wrap}
  .wschip{flex:1;min-width:150px;background:var(--g100);border:1px solid var(--border);border-radius:10px;padding:12px}
  .wschip .t{font-weight:600;font-size:13px;margin-bottom:3px}.wschip .m{font-size:12px;color:var(--muted)}
  .footnote{font-size:12px;color:var(--g400);margin-top:22px;text-align:center;line-height:1.6}

  /* form (service request) */
  .frm label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:12px 0 5px}
  .frm input,.frm select{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:9px;background:var(--bg);color:var(--fg);font-family:inherit;font-size:13px}
  .gen{font-size:11px;color:var(--pulse);background:var(--pulse-soft);border-radius:7px;padding:6px 10px;margin-bottom:6px;display:inline-flex;gap:6px;align-items:center}

  /* ---------- perspective switcher (waffle) ---------- */
  .overlay{position:fixed;inset:0;background:rgba(10,10,11,.4);backdrop-filter:blur(3px);display:none;z-index:100}
  .overlay.show{display:block}
  .waffle{position:absolute;top:54px;right:120px;width:340px;background:var(--bg);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);padding:14px;animation:pop .14s ease}
  @keyframes pop{from{transform:translateY(-6px);opacity:.3}to{transform:none;opacity:1}}
  .waffle .wg{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--g400);font-weight:600;margin:10px 4px 8px}
  .wgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .wtile{aspect-ratio:1;border:1px solid var(--border);border-radius:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;font-size:11px;font-weight:600;color:var(--g700);padding:6px}
  [data-theme="dark"] .wtile{color:#c9c9d0}
  .wtile:hover{border-color:var(--pulse);color:var(--pulse);background:var(--pulse-soft)}
  .wtile.on{background:var(--pulse-soft);border-color:var(--pulse);color:var(--pulse)}
  .wtile.locked{opacity:.4;pointer-events:none}
  .wtile .e{font-size:18px}
  .wfoot{margin-top:12px;border-top:1px solid var(--border);padding-top:10px;font-size:12px;color:var(--muted);display:flex;justify-content:space-between;align-items:center}

  /* ---------- Ask One palette ---------- */
  .palette{position:absolute;top:78px;left:50%;transform:translateX(-50%);width:680px;max-width:92vw;background:var(--bg);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);overflow:hidden;animation:pop .14s ease}
  .palette .pin{display:flex;align-items:center;gap:12px;padding:15px 18px;border-bottom:1px solid var(--border)}
  .palette .halo{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--pulse),#ff9a6e)}
  .palette .pin input{flex:1;border:none;outline:none;background:none;font-size:16px;color:var(--fg);font-family:inherit}
  .palette .pin .ctx{font-size:11px;color:var(--pulse);background:var(--pulse-soft);border-radius:6px;padding:3px 8px;white-space:nowrap}
  .palette .pin .esc{font-size:11px;border:1px solid var(--border);border-radius:5px;padding:3px 7px;color:var(--muted)}
  .pres{max-height:54vh;overflow-y:auto;padding:8px}
  .aians{background:var(--pulse-soft);border:1px solid rgba(241,78,35,.25);border-radius:11px;padding:13px 14px;margin:6px}
  .aians .h{font-size:12px;font-weight:700;color:var(--pulse);display:flex;align-items:center;gap:6px;margin-bottom:6px}
  .aians p{font-size:13.5px;line-height:1.5}.aians .src{font-size:11px;color:var(--muted);margin-top:7px}
  .aians .plan{font-size:12.5px;line-height:1.7;margin-top:8px}
  .aians .ab{display:flex;gap:7px;margin-top:9px}
  .grp{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:600;padding:10px 12px 4px}
  .sr{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:9px;font-size:13px}
  .sr:hover{background:var(--g100)}
  .sr .ic{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;background:var(--g100);font-size:14px}
  .sr .gr{flex:1;min-width:0}.sr .gr .t{font-weight:500}.sr .gr .m{font-size:12px;color:var(--muted)}
  .sr .act{font-size:11px;color:var(--muted);border:1px solid var(--border);border-radius:5px;padding:2px 6px}
  .sr.action .ic{background:var(--pulse-soft);color:var(--pulse)}

  /* ---------- mobile ---------- */
  #mobile{display:none;place-items:center;height:100%;padding:24px;overflow:auto}
  .phone{width:336px;height:700px;background:var(--bg);border:10px solid #111;border-radius:42px;box-shadow:var(--shadow);overflow:hidden;position:relative;display:flex;flex-direction:column}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:128px;height:26px;background:#111;border-radius:0 0 16px 16px;z-index:5}
  .pbar{padding:34px 18px 10px;display:flex;align-items:center;gap:8px}
  .pbar .nm{font-weight:700;font-size:17px}.pbar .right{margin-left:auto;display:flex;gap:10px;align-items:center}
  .pask{margin:6px 14px 0;background:var(--g100);border:1px solid var(--border);border-radius:11px;padding:9px 12px;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px}
  .pask .halo{width:16px;height:16px;border-radius:50%;background:linear-gradient(135deg,var(--pulse),#ff9a6e)}
  .pbody{flex:1;overflow-y:auto;padding:6px 14px 80px}
  .pgrp{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:600;margin:14px 2px 8px}
  .pcard{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:13px;margin-bottom:10px}
  .pcard .t{font-weight:600;font-size:14px}.pcard .m{font-size:12px;color:var(--muted);margin:2px 0 10px}
  .pcard .acts{display:flex;gap:8px}.swipe{font-size:11px;color:var(--g400);text-align:center;margin-top:6px}
  .ptab{position:absolute;bottom:0;left:0;right:0;height:62px;background:var(--bg);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;padding-bottom:6px}
  .ti{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--muted)}.ti.on{color:var(--pulse)}.ti svg{width:20px;height:20px}
  .fab{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--pulse),#ff8a5c);display:grid;place-items:center;margin-top:-16px;box-shadow:0 4px 14px rgba(241,78,35,.4)}

  .vtoggle{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:130;background:var(--ink);color:#fff;border-radius:20px;padding:9px 16px;font-size:12px;font-weight:600;box-shadow:var(--shadow);border:1px solid #333;display:flex;gap:8px}
  [data-theme="dark"] .vtoggle{border-color:#444}
</style>
</head>
<body data-theme="light">

<div class="app" id="desktop">
  <!-- GLOBAL BAR -->
  <div class="bar">
    <div class="brand">
      <div class="mk"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h4l2-6 4 14 3-10 2 2h5"/></svg></div>

</div>

<!-- OVERLAYS -->
<div class="overlay" id="overlay"></div>

<button class="vtoggle" id="vtoggle">📱 <span>Mobile view</span></button>

<script>
/* ---------------- perspectives ---------------- */
const P = {
  csm: {label:'CSM', emoji:'🛟', group:'functional', access:true,
    tag:'CSM perspective', hello:'Hi Chanuka — 4 cases need you.', sub:'Customer Success · your cases and accounts',
    insight:'"Acme is your only red account. Closing the open P1 (#4821) brings it back to green — draft is ready in Ask One."',
    src:'▸ from: Support · Account health · Usage',
    chips:['Reply to a case','Open a case','Account health','Ask One'],
    cards:[
      {h:'My cases <span class="badge">4</span>', b:`
        <div class="row"><span class="ic">🔴</span><div class="gr"><div class="t">#4821 Acme — latency /orders</div><div class="m">P1 · reply due today</div></div><button class="btn primary">Reply</button></div>
        <div class="row"><span class="ic">🟠</span><div class="gr"><div class="t">#4799 Globex — SSO config</div><div class="m">P2 · waiting on customer</div></div></div>
        <div class="row"><span class="ic">○</span><div class="gr"><div class="t">#4760 Initech — docs</div><div class="m">P3</div></div></div>`},
      {h:'Accounts I own <span class="badge">12</span>', b:`
        <div class="row"><span class="ic">🏢</span><div class="gr"><div class="t">Acme Corp</div><div class="m">Enterprise · renewal 84d</div></div><span class="pill p-crit">At risk</span></div>
        <div class="row"><span class="ic">🏢</span><div class="gr"><div class="t">Globex</div><div class="m">usage −30%</div></div><span class="pill p-watch">Watch</span></div>
        <div class="row"><span class="ic">🏢</span><div class="gr"><div class="t">Northwind</div><div class="m">expanding</div></div><span class="pill p-ok">Healthy</span></div>`}

const ORDER = ['csm','people','sales','revops','marketing','finance','leadership'];

let active = 'csm';
let home = 'csm';

/* ---------- rail ---------- */
const rail = document.getElementById('rail');
function renderRail(){
  let h = `<div class="rgrp">Perspective</div>
    <button class="pnav ${active==='home'?'on':''}" data-go="${home}"><span class="gi">◎</span> Home</button>
    <div class="rgrp">Functional</div>`;
  ORDER.forEach(k=>{
    const p=P[k];
    h+=`<button class="pnav ${active===k?'on':''} ${p.access?'':'locked'}" data-go="${k}" ${p.access?'':'disabled'}><span class="gi">${p.emoji}</span> ${p.label}${p.access?'':'<span class="lk">🔒</span>'}</button>`;
  });
  h+=`<div class="rgrp">For you</div>`;
  CROSS.forEach(k=>{const p=P[k];h+=`<button class="pnav ${active===k?'on':''}" data-go="${k}"><span class="gi">${p.emoji}</span> ${p.label}</button>`;});
  h+=`<div class="railftr"><button class="pnav"><span class="gi">⚙</span> Settings</button></div>`;
  rail.innerHTML=h;
  rail.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>{if(b.disabled)return;go(b.dataset.go);});
}

/* ---------- canvas ---------- */
const canvas = document.getElementById('canvas');
function renderCanvas(){
  const p = P[active];

    <div class="hello">${p.hello}</div><div class="sub">${p.sub}</div>
    <div class="insight"><div class="t">✦ Ask One — insight</div><p>${p.insight}</p><div class="src">${p.src}</div></div>

    <div class="grid ${p.cardCls||'g2'}">${p.cards.map(c=>`<div class="card"><h4>${c.h}</h4>${c.b}</div>`).join('')}</div>`;
  if(p.extra){ h+=`<div class="card" style="margin-top:14px"><h4>${p.extraTitle}</h4>${p.extra}</div>`; }

  canvas.innerHTML=h;
  canvas.scrollTop=0;
}

function go(k){
  if(k==='home') k=home;
  active=k; renderRail(); renderCanvas(); closeOverlays();
}

/* ---------- overlays ---------- */
const overlay=document.getElementById('overlay');
function closeOverlays(){overlay.classList.remove('show');overlay.innerHTML='';}
overlay.onclick=e=>{if(e.target===overlay)closeOverlays();};

function openWaffle(){
  overlay.innerHTML = `<div class="waffle" id="waffle">
    <div class="wg">Functional</div>
    <div class="wgrid">${ORDER.map(k=>{const p=P[k];return `<button class="wtile ${active===k?'on':''} ${p.access?'':'locked'}" data-go="${k}"><span class="e">${p.emoji}</span>${p.label}${p.access?'':' 🔒'}</button>`;}).join('')}</div>
    <div class="wg">For you</div>
    <div class="wgrid">${CROSS.map(k=>{const p=P[k];return `<button class="wtile ${active===k?'on':''}" data-go="${k}"><span class="e">${p.emoji}</span>${p.label}</button>`;}).join('')}</div>
    <div class="wfoot"><span>Home perspective</span><b style="color:var(--pulse)">${P[home].label}</b></div>
  </div>`;
  overlay.classList.add('show');
  const w=document.getElementById('waffle'); w.onclick=e=>e.stopPropagation();
  w.querySelectorAll('[data-go]').forEach(b=>{if(!b.classList.contains('locked'))b.onclick=()=>go(b.dataset.go);});
}

document.getElementById('waffleBtn').onclick=openWaffle;
document.getElementById('askTrigger').onclick=openAsk;
document.getElementById('themeBtn').onclick=()=>{document.body.dataset.theme=document.body.dataset.theme==='dark'?'light':'dark';};

document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){e.preventDefault();overlay.classList.contains('show')?closeOverlays():openAsk();}
  if(e.key==='Escape')closeOverlays();
});

/* mobile toggle */
let mobile=false;
document.getElementById('vtoggle').onclick=()=>{
  mobile=!mobile;
  document.getElementById('desktop').style.display=mobile?'none':'grid';
  document.getElementById('mobile').style.display=mobile?'grid':'none';
  document.getElementById('vtoggle').querySelector('span').textContent=mobile?'Desktop view':'Mobile view';
  document.getElementById('vtoggle').firstChild.textContent=mobile?'🖥 ':'📱 ';
};

renderRail(); renderCanvas();
</script>
